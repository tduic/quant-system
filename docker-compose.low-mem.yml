# Low-memory overrides for 8GB machines (M1 Mac mini, etc.)
# Usage: docker compose -f docker-compose.yml -f docker-compose.low-mem.yml up -d
#   or:  make up-lowmem

services:
  zookeeper:
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    environment:
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 512M

  timescaledb:
    command: >
      postgres
        -c shared_buffers=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=256MB
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 192M

  market-data:
    deploy:
      resources:
        limits:
          memory: 128M

  storage:
    deploy:
      resources:
        limits:
          memory: 128M

  alpha-engine:
    deploy:
      resources:
        limits:
          memory: 256M

  risk-gateway:
    deploy:
      resources:
        limits:
          memory: 128M

  execution:
    deploy:
      resources:
        limits:
          memory: 128M

  post-trade:
    deploy:
      resources:
        limits:
          memory: 256M

  dashboard:
    deploy:
      resources:
        limits:
          memory: 64M

  prometheus:
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    deploy:
      resources:
        limits:
          memory: 256M

  alertmanager:
    deploy:
      resources:
        limits:
          memory: 64M

  grafana:
    deploy:
      resources:
        limits:
          memory: 128M
