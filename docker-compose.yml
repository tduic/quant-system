services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: quant-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: quant-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 days default
      KAFKA_MESSAGE_MAX_BYTES: 1048576
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: quant-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/create_topics.sh:/create_topics.sh
    entrypoint: ["/bin/bash", "/create_topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: quant-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantdb}
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_dev}
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-quantdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: quant-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  market-data:
    build:
      context: .
      dockerfile: services/market-data/Dockerfile
    container_name: quant-market-data
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      EXCHANGE_WS_URL: "wss://ws-feed.exchange.coinbase.com"
      SYMBOLS: "${SYMBOLS:-btcusd,ethusd,solusd}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  storage:
    build:
      context: .
      dockerfile: services/storage/Dockerfile
    container_name: quant-storage
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://${POSTGRES_USER:-quant}:${POSTGRES_PASSWORD:-quant_dev}@timescaledb:5432/${POSTGRES_DB:-quantdb}
      BATCH_SIZE: 1000
      BATCH_TIMEOUT_MS: 1000
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # -------------------------------------------------------------------------
  # Phase 2 services
  # -------------------------------------------------------------------------

  alpha-engine:
    build:
      context: .
      dockerfile: services/alpha-engine/Dockerfile
    container_name: quant-alpha-engine
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      SYMBOLS: "${SYMBOLS:-btcusd,ethusd,solusd}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  risk-gateway:
    build:
      context: .
      dockerfile: services/risk-gateway/Dockerfile
    container_name: quant-risk-gateway
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${RISK_API_PORT:-8090}:8090"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      MAX_POSITION_NOTIONAL: "${MAX_POSITION_NOTIONAL:-10000}"
      MAX_ORDER_NOTIONAL: "${MAX_ORDER_NOTIONAL:-1000}"
      MAX_DRAWDOWN_PCT: "${MAX_DRAWDOWN_PCT:-0.10}"
      MAX_TOTAL_EXPOSURE: "${MAX_TOTAL_EXPOSURE:-500000}"
      RISK_API_PORT: "8090"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  execution:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    container_name: quant-execution
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      TRADING_MODE: "${TRADING_MODE:-paper}"
      COINBASE_API_KEY: "${COINBASE_API_KEY:-}"
      COINBASE_API_SECRET: "${COINBASE_API_SECRET:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # -------------------------------------------------------------------------
  # Phase 4: Post-Trade Dashboard
  # -------------------------------------------------------------------------

  post-trade:
    build:
      context: .
      dockerfile: services/post-trade/Dockerfile
    container_name: quant-post-trade
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://${POSTGRES_USER:-quant}:${POSTGRES_PASSWORD:-quant_dev}@timescaledb:5432/${POSTGRES_DB:-quantdb}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # -------------------------------------------------------------------------
  # Phase 7: Dashboard Frontend
  # -------------------------------------------------------------------------

  dashboard:
    build:
      context: services/post-trade/frontend
      dockerfile: Dockerfile
    container_name: quant-dashboard
    depends_on:
      - post-trade
    ports:
      - "3000:80"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # -------------------------------------------------------------------------
  # Phase 12: Monitoring
  # -------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  alertmanager:
    image: prom/alertmanager:latest
    container_name: quant-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    environment:
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  timescale_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
