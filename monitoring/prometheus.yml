global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'risk-gateway'
    static_configs:
      - targets: ['risk-gateway:9090']
    metrics_path: /metrics

  - job_name: 'execution'
    static_configs:
      - targets: ['execution:9090']
    metrics_path: /metrics

  - job_name: 'alpha-engine'
    static_configs:
      - targets: ['alpha-engine:9090']
    metrics_path: /metrics

  - job_name: 'post-trade'
    static_configs:
      - targets: ['post-trade:9090']
    metrics_path: /metrics

  - job_name: 'market-data'
    static_configs:
      - targets: ['market-data:9090']
    metrics_path: /metrics
