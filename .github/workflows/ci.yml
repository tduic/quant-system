name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14-dev"

      - name: Install dependencies
        run: |
          pip install -e lib/
          pip install -r requirements-test.txt

      - name: Lint
        run: ruff check lib/ services/ conftest.py

      - name: Format check
        run: ruff format --check lib/ services/ conftest.py

      - name: Run tests with coverage
        run: python -m pytest --cov --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build market-data image
        run: docker build -f services/market-data/Dockerfile -t quant-market-data .

      - name: Build storage image
        run: docker build -f services/storage/Dockerfile -t quant-storage .

      - name: Build alpha-engine image
        run: docker build -f services/alpha-engine/Dockerfile -t quant-alpha-engine .

      - name: Build risk-gateway image
        run: docker build -f services/risk-gateway/Dockerfile -t quant-risk-gateway .

      - name: Build execution image
        run: docker build -f services/execution/Dockerfile -t quant-execution .

      - name: Build post-trade image
        run: docker build -f services/post-trade/Dockerfile -t quant-post-trade .
